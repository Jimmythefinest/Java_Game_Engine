plugins {
    id 'java'
    id 'application'
}

group = 'com.njst'
version = '1.0.0'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

sourceSets {
    main {
        java {
            srcDirs = [rootProject.file('src')]
            exclude 'com/njst/gaming/Math/Matrix4.java'
            exclude 'com/njst/gaming/Math/Quaternion.java'
            exclude 'com/njst/gaming/Math/Tetrahedron.java'
            exclude 'com/njst/gaming/Math/Vector3.java'
            exclude 'com/njst/gaming/Math/Vector3f.java'
            exclude 'com/njst/gaming/Animations/**/*.java'
            exclude 'com/njst/gaming/Bone.java'
            exclude 'com/njst/gaming/Camera.java'
            exclude 'com/njst/gaming/Scene.java'
            exclude 'com/njst/gaming/Renderer.java'
            exclude 'com/njst/gaming/RootLogger.java'
            exclude 'com/njst/gaming/data.java'
            exclude 'com/njst/gaming/Physics/Triangle.java'
            exclude 'com/njst/gaming/Physics/PhysicsEngine.java'
            exclude 'com/njst/gaming/Utils/GeneralUtil.java'
            exclude 'com/njst/gaming/Utils/Matrice_Math.java'
            exclude 'com/njst/gaming/Utils/PerlinNoise.java'
            exclude 'com/njst/gaming/Utils/Utils.java'
            exclude 'com/njst/gaming/graphics/**/*.java'
            exclude 'com/njst/gaming/Geometries/**/*.java'
            exclude 'com/njst/gaming/objects/GameObject.java'
            exclude 'com/njst/gaming/objects/Bone_object.java'
            exclude 'com/njst/gaming/objects/CollisionBoxGameObject.java'
            exclude 'com/njst/gaming/objects/LODGameObject.java'
            exclude 'com/njst/gaming/objects/Weighted_GameObject.java'
            exclude 'com/njst/gaming/objects/instancedGameObject.java'
            exclude 'com/njst/gaming/simulation/**/*.java'
            exclude 'com/njst/gaming/simulationLoader.java'
            exclude 'com/njst/gaming/skeleton/Skeleton.java'
            exclude 'com/njst/gaming/EvolutionSim.java'
            exclude 'com/njst/gaming/EvolutionSimulation.java'
            exclude 'com/njst/gaming/SimpleLoader.java'
            exclude 'com/njst/gaming/TetraLoader.java'
            exclude 'com/njst/gaming/Loaders/BHVLoader.java'
            exclude 'com/njst/gaming/Loaders/BoneDeserializer.java'
            exclude 'com/njst/gaming/Loaders/GraphSocietySimulationLoader.java'
            exclude 'com/njst/gaming/Loaders/ObjLoader.java'
            exclude 'com/njst/gaming/Loaders/PlantLoader.java'
            exclude 'com/njst/gaming/Loaders/SceneState.java'
            exclude 'com/njst/gaming/Networking/TCPChatServer.java'
            exclude 'com/njst/gaming/SSBOManager.java'
            exclude 'com/njst/gaming/SceneLoaders/blank.java'
            exclude 'com/njst/gaming/Simulations/Creature.java'
            exclude 'com/njst/gaming/ai/Character.java'
            exclude 'com/njst/gaming/ai/Entity.java'
            exclude 'com/njst/gaming/ai/NeuralNetwork.java'
            exclude 'com/njst/gaming/ai/QLearningNeuralNetwork.java'
            exclude 'com/njst/gaming/ai/RLNeuralNetwork.java'
            exclude 'com/njst/gaming/ai/TicTacToeQLearning.java'
            exclude 'com/njst/gaming/objects/Ant.java'
            exclude 'com/njst/gaming/black.java'
            exclude 'com/njst/gaming/untitled.txt'
            exclude 'GameObjectTest.java'
            exclude 'test.java'
        }
        resources {
            srcDirs = [rootProject.file('src/resources')]
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':engine-core')
    implementation fileTree(dir: rootProject.file('../../Java_libs'), include: ['*.jar'])
}

application {
    mainClass = 'com.rebuild.RotatingCube'
}

tasks.register('runDemo', JavaExec) {
    group = 'application'
    description = 'Run RotatingCube demo (equivalent to run.sh)'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = application.mainClass
}
