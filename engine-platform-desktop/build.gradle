plugins {
    id 'java'
    id 'application'
}

group = 'com.njst'
version = '1.0.0'

def lwjglVersion = '3.3.6'
def packagedAppName = 'NJST-3D-Tetris'
def packagedVendor = 'NJST'
def packagedMainClass = 'com.rebuild.Tetris3D'
def defeatedSkinnedOutput = 'src/main/resources/skinned/defeated.model.json'

def androidSkinnedOutput = '../android/engine-platform-android/src/main/assets/skinned/defeated.model.json'

java {
    sourceCompatibility = JavaVersion.VERSION_1_8
    targetCompatibility = JavaVersion.VERSION_1_8
}

sourceSets {
    main {
        java {
            srcDirs = ['src/main/java']
        }
        resources {
            srcDirs = ['src/main/resources']
        }
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':engine-core')
    implementation platform("org.lwjgl:lwjgl-bom:${lwjglVersion}")
    implementation 'org.lwjgl:lwjgl'
    implementation 'org.lwjgl:lwjgl-assimp'
    implementation 'org.lwjgl:lwjgl-glfw'
    implementation 'org.lwjgl:lwjgl-openal'
    implementation 'org.lwjgl:lwjgl-opengl'
    implementation 'org.lwjgl:lwjgl-stb'

    runtimeOnly 'org.lwjgl:lwjgl::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-assimp::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-glfw::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-openal::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-opengl::natives-linux'
    runtimeOnly 'org.lwjgl:lwjgl-stb::natives-linux'
}

application {
    mainClass = packagedMainClass
}

tasks.register('runDemo', JavaExec) {
    group = 'application'
    description = 'Run the desktop 3D Tetris demo'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = providers.gradleProperty("demoMainClass").orElse(application.mainClass).get()
}

tasks.register('runBattleground', JavaExec) {
    group = 'application'
    description = 'Run the battle arena skybox demo'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.ri.battlearena.BattleArenaApp'
    if (project.hasProperty('serverIp')) {
        args project.property('serverIp')
    }
    if (project.hasProperty('serverPort')) {
        args project.property('serverPort')
    }
    if (project.hasProperty('remoteHost')) {
        systemProperty 'battleArena.remoteHost', project.property('remoteHost')
    }
    if (project.hasProperty('remotePort')) {
        systemProperty 'battleArena.remotePort', project.property('remotePort')
    }
    if (project.hasProperty('localPlayer')) {
        systemProperty 'battleArena.localPlayer', project.property('localPlayer')
    }
}

tasks.register('runBattleArenaTcpControlServer', JavaExec) {
    group = 'application'
    description = 'Run the TCP relay server for battle arena remote controls'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.ri.battlearena.networking.BattleArenaTcpControlServer'
    if (project.hasProperty('port')) {
        args project.property('port')
    }
}

tasks.register('battleArenaTcpControlServerJar', Jar) {
    group = 'build'
    description = 'Build a tiny standalone jar for the battle arena TCP relay server'
    archiveBaseName = 'battle-arena-tcp-control-server'
    duplicatesStrategy = DuplicatesStrategy.EXCLUDE
    dependsOn(':engine-core:classes', 'classes')

    from(sourceSets.main.output) {
        include 'com/njst/gaming/ri/battlearena/networking/BattleArenaTcpControlServer*.class'
    }
    from(project(':engine-core').sourceSets.main.output) {
        include 'com/njst/gaming/Networking/AbstractNetworkPeer.class'
        include 'com/njst/gaming/Networking/MessageFramer.class'
        include 'com/njst/gaming/Networking/NetworkConnection.class'
        include 'com/njst/gaming/Networking/NetworkEvent.class'
        include 'com/njst/gaming/Networking/NetworkEventType.class'
        include 'com/njst/gaming/Networking/NetworkListener.class'
        include 'com/njst/gaming/Networking/NetworkMessage.class'
        include 'com/njst/gaming/Networking/NetworkPeer.class'
        include 'com/njst/gaming/Networking/NetworkSettings.class'
        include 'com/njst/gaming/Networking/TcpConnection*.class'
        include 'com/njst/gaming/Networking/TcpNetworkServer*.class'
        include 'com/njst/gaming/ri/battlearena/networking/BattleArenaTcpSessionMessage.class'
    }

    manifest {
        attributes(
                'Main-Class': 'com.njst.gaming.ri.battlearena.networking.BattleArenaTcpControlServer'
        )
    }
}

tasks.register('runCollisionDemo', JavaExec) {
    group = 'application'
    description = 'Run the collision box runtime demo'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.CollisionBoxDemoApp'
}

tasks.register('runCubeHeightmapBake', JavaExec) {
    group = 'application'
    description = 'Bake a cube into a spherical heightmap PNG'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.CubeHeightmapBakeApp'
}

tasks.register('runHeightmapPreview', JavaExec) {
    group = 'application'
    description = 'Render the baked spherical heightmap PNG as geometry'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.HeightmapPreviewApp'
}

tasks.register('exportDefeatedSkinnedAsset', JavaExec) {
    group = 'build'
    description = 'Bake Defeated.fbx into the internal skinned model asset format'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.assets.skinned.ExportDefeatedSkinnedAsset'
    args(
            project.file('src/main/resources/Defeated.fbx').absolutePath,
            'j.jpg',
            project.file(defeatedSkinnedOutput).absolutePath,
            '100.0'
    )
}

tasks.register('exportFbxAnimation', JavaExec) {
    group = 'build'
    description = 'Export an FBX animation into the serialized .ser animation asset format'
    classpath = sourceSets.main.runtimeClasspath
    mainClass = 'com.njst.gaming.assets.skinned.ExportFbxAnimationAsset'

    def inputFbx = providers.gradleProperty('fbx')
    def animationIndex = providers.gradleProperty('animationIndex').orElse('0')
    def scale = providers.gradleProperty('scale').orElse('100.0')
    def outputPath = providers.gradleProperty('out')

    doFirst {
        if (!inputFbx.present) {
            throw new GradleException("Missing -Pfbx=/absolute/or/relative/path/to/file.fbx")
        }

        def resolvePath = { String rawPath ->
            File candidate = new File(rawPath)
            candidate.isAbsolute() ? candidate : rootProject.file(rawPath)
        }

        File resolvedInput = resolvePath(inputFbx.get())
        String defaultName = resolvedInput.name.lastIndexOf('.') >= 0
                ? resolvedInput.name.substring(0, resolvedInput.name.lastIndexOf('.')).toLowerCase() + "_animation_" + animationIndex.get() + ".ser"
                : resolvedInput.name.toLowerCase() + "_animation_" + animationIndex.get() + ".ser"
        File resolvedOutput = outputPath.present
                ? resolvePath(outputPath.get())
                : project.file("src/main/resources/weighted_geometry/${defaultName}")

        args(
                resolvedInput.absolutePath,
                resolvedOutput.absolutePath,
                animationIndex.get(),
                scale.get()
        )
    }
}

tasks.register('syncDefeatedSkinnedAssetToAndroid', Copy) {
    group = 'build'
    description = 'Copy the baked skinned model asset into Android assets'
    dependsOn tasks.named('exportDefeatedSkinnedAsset')
    from(project.file(defeatedSkinnedOutput))
    into(project.file('../android/engine-platform-android/src/main/assets/skinned'))
    rename { 'defeated.model.json' }
}

tasks.register('stageJpackageInput', Sync) {
    group = 'distribution'
    description = 'Stage jars and external resources for jpackage'
    dependsOn tasks.named('jar')

    into(layout.buildDirectory.dir('jpackage/input'))
    from(tasks.named('jar'))
    from(configurations.runtimeClasspath)
    from('src/main/resources') {
        into 'resources'
    }
}

tasks.register('jpackageImage', Exec) {
    group = 'distribution'
    description = 'Build a desktop app image with jpackage'
    dependsOn tasks.named('stageJpackageInput')

    doFirst {
        def inputDir = layout.buildDirectory.dir('jpackage/input').get().asFile
        def destDir = layout.buildDirectory.dir('jpackage').get().asFile
        destDir.mkdirs()

        commandLine(
                'jpackage',
                '--type', 'app-image',
                '--name', packagedAppName,
                '--dest', destDir.absolutePath,
                '--input', inputDir.absolutePath,
                '--main-jar', tasks.named('jar').get().archiveFileName.get(),
                '--main-class', application.mainClass.get(),
                '--app-version', project.version.toString(),
                '--vendor', packagedVendor,
                '--java-options', '-Dnjst.resources.dir=$APPDIR/resources'
        )
    }
}
